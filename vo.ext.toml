[extension]
name = "resvg"

[extension.native]
path = "rust/target/{profile}/libvo_resvg"

[[extension.native.targets]]
target = "aarch64-apple-darwin"
library = "libvo_resvg.dylib"

[[extension.native.targets]]
target = "x86_64-unknown-linux-gnu"
library = "libvo_resvg.so"

[extension.wasm]
type = "standalone"
wasm = "resvg.wasm"
